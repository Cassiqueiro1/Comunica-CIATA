name: ComunicaCIATA

options:
  bundleIdPrefix: br.org.ciata
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: CIATA
    CODE_SIGN_STYLE: Automatic

targets:
  ComunicaCIATA:
    type: application
    platform: iOS
    sources:
      - ComunicaCIATA
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: br.org.ciata.comunicaciata
        INFOPLIST_KEY_CFBundleDisplayName: Comunica-CIATA
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: ComunicaCIATA/Info.plist
      properties:
        CFBundleDisplayName: Comunica-CIATA
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false